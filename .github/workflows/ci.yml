name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kod
      uses: actions/checkout@v3

    - name: Sätt upp Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Installera beroenden
      run: |
        pip install pytest

    - name: Kör tester
      run: |
        pytest
